<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kochi Secret Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); padding: 20px; }
        .product { border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin-bottom: 10px; background: var(--tg-theme-secondary-bg-color, #f9f9f9); }
        .buy-btn { background: var(--tg-theme-button-color, #248bcf); color: var(--tg-theme-button-text-color, #fff); border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>🛍️ Exclusive Kochi Shop</h2>
    <div id="shop-container">
        <div class="product">
            <h3>Premium Product A</h3>
            <p>Price: ₹500</p>
            <button class="buy-btn" onclick="order('Product A')">Add to Cart</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); // Tells Telegram the app is loaded
        tg.expand(); // Makes the portal full screen

        function order(itemName) {
            // Sends the order details back to your bot
            const data = JSON.stringify({ item: itemName, status: 'order_placed' });
            tg.sendData(data); 
            tg.close(); // Closes the portal after ordering
        }
    </script>
</body>
</html>
