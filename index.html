<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kochi Private Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-secondary-bg-color: #f0f2f5;
            --tg-theme-button-color: #248bcf;
            --tg-theme-button-text-color: #ffffff;
            --accent-color: #ff3b30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #248bcf, #007aff);
            color: white;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .container { padding: 15px; }

        .product-card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            padding: 12px;
            border: 1px solid rgba(0,0,0,0.05);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-img-wrapper {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            padding: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-right: 15px;
        }

        .product-img-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .info { flex-grow: 1; }
        .name { font-weight: 700; font-size: 16px; margin-bottom: 3px; display: block; }
        .age { font-size: 13px; color: #8e8e93; }
        .price { color: #28a745; font-weight: 800; font-size: 17px; display: block; margin-top: 4px; }

        .order-btn {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .order-btn:active { transform: scale(0.95); }

        /* Checkout Modal */
        #checkoutOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end;
        }

        .modal {
            background: white;
            width: 100%;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            padding: 25px;
            box-sizing: border-box;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal h3 { margin-top: 0; color: #333; }
        input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1.5px solid #eee;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            background: #f9f9f9;
        }

        .confirm-btn {
            background: #28a745;
            color: white;
            width: 100%;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 22px;">KOCHI PRIVATE STORE</h1>
    <p style="margin:5px 0 0; font-size:12px; opacity:0.8;">Premium Desi Collections</p>
</header>

<div class="container" id="product-list">
    </div>

<div id="checkoutOverlay">
    <div class="modal">
        <h3 id="modalTitle">Order Details</h3>
        <input type="text" id="custName" placeholder="മുഴുവൻ പേര് (Full Name)">
        <input type="tel" id="custPhone" placeholder="മൊബൈൽ നമ്പർ (Mobile Number)">
        <input type="text" id="custAddr" placeholder="സ്ഥലം / വിലാസം (Address)">
        <button class="confirm-btn" onclick="finalSubmit()">CONFIRM ORDER</button>
        <button onclick="closeModal()" style="background:none; border:none; width:100%; margin-top:10px; color:#888;">Cancel</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    let selectedItem = "";
    let selectedPrice = 0;

    const products = [
        {n: "Meenakshi", a: 22, p: 4500, id: 1},
        {n: "Athira", a: 24, p: 9800, id: 2},
        {n: "Lakshmi", a: 21, p: 3200, id: 3},
        {n: "Parvathi", a: 26, p: 1950, id: 4},
        {n: "Chithra", a: 23, p: 1100, id: 5},
        {n: "Malavika", a: 25, p: 5400, id: 6},
        {n: "Nandhini", a: 20, p: 6100, id: 7},
        {n: "Shreya", a: 27, p: 2800, id: 8},
        {n: "Anjali", a: 29, p: 7500, id: 9},
        {n: "Gopika", a: 30, p: 10000, id: 10}
    ];

    const listContainer = document.getElementById('product-list');

    products.forEach(p => {
        const card = `
            <div class="product-card">
                <div class="product-img-wrapper">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${p.n}&backgroundColor=b6e3f4" alt="${p.n}">
                </div>
                <div class="info">
                    <span class="name">${p.n} <span class="age">(${p.a})</span></span>
                    <span class="price">₹${p.p.toLocaleString('en-IN')}</span>
                </div>
                <button class="order-btn" onclick="openCheckout('${p.n}', ${p.p})">ORDER</button>
            </div>
        `;
        listContainer.innerHTML += card;
    });

    function openCheckout(name, price) {
        selectedItem = name;
        selectedPrice = price;
        document.getElementById('modalTitle').innerText = "Order " + name;
        document.getElementById('checkoutOverlay').style.display = 'flex';
        tg.HapticFeedback.impactOccurred('medium');
    }

    function closeModal() {
        document.getElementById('checkoutOverlay').style.display = 'none';
    }

    function finalSubmit() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const addr = document.getElementById('custAddr').value;

        if(!name || !phone || !addr) {
            tg.showAlert("ദയവായി എല്ലാ വിവരങ്ങളും നൽകുക!");
            return;
        }

        const orderData = {
            item: selectedItem,
            price: selectedPrice,
            customer: name,
            mobile: phone,
            address: addr
        };

        tg.sendData(JSON.stringify(orderData));
        tg.close();
    }
</script>
</body>
</html>
