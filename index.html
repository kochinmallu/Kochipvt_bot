<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding: 15px; }
        .product-card { background: var(--tg-theme-secondary-bg-color); border-radius: 12px; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; border: 1px solid #ddd; }
        .product-img { width: 70px; height: 70px; border-radius: 50%; background: #eee; margin-right: 15px; border: 2px solid #f1c40f; }
        .info { flex-grow: 1; }
        .add-btn { background: #2ecc71; color: white; border: none; padding: 8px; border-radius: 5px; }
        
        /* Modal Style for Checkout */
        #orderForm { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
        .form-content { background: white; padding: 20px; border-radius: 10px; width: 80%; color: black; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">📦 Kochi Private Mall</h2>
    <div id="list"></div>

    <div id="orderForm">
        <div class="form-content">
            <h3>നിങ്ങളുടെ വിവരങ്ങൾ</h3>
            <input type="text" id="custName" placeholder="മുഴുവൻ പേര്">
            <input type="tel" id="custPhone" placeholder="മൊബൈൽ നമ്പർ">
            <input type="text" id="custAddr" placeholder="സ്ഥലം/വിലാസം">
            <button class="add-btn" style="width:100%" onclick="finalSubmit()">Confirm Order</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let selectedItem = "";
        let selectedPrice = 0;

        const products = [
            {n: "Meenakshi", a: 22, p: 4500}, {n: "Athira", a: 24, p: 9800},
            {n: "Lakshmi", a: 21, p: 3200}, {n: "Parvathi", a: 26, p: 1950},
            {n: "Chithra", a: 23, p: 1100}, {n: "Malavika", a: 25, p: 5400},
            {n: "Nandhini", a: 20, p: 6100}, {n: "Shreya", a: 27, p: 2800},
            {n: "Anjali", a: 29, p: 7500}, {n: "Gopika", a: 30, p: 10000}
        ];

        const listDiv = document.getElementById('list');
        products.forEach(pd => {
            listDiv.innerHTML += `
                <div class="product-card">
                    <div class="product-img"><img src="3d_model.png" style="width:100%; border-radius:50%"></div>
                    <div class="info">
                        <strong>${pd.n} (${pd.a})</strong><br>
                        <span style="color:#2ecc71">₹${pd.p}</span>
                    </div>
                    <button class="add-btn" onclick="openForm('${pd.n}', ${pd.p})">Order</button>
                </div>`;
        });

        function openForm(name, price) {
            selectedItem = name;
            selectedPrice = price;
            document.getElementById('orderForm').style.display = 'flex';
        }

        function finalSubmit() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const addr = document.getElementById('custAddr').value;

            if(!name || !phone) return alert("ദയവായി വിവരങ്ങൾ നൽകുക");

            const data = {
                item: selectedItem,
                price: selectedPrice,
                customer: name,
                mobile: phone,
                address: addr
            };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
